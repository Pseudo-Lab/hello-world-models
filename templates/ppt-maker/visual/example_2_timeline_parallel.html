<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<title>BL-1B v2 — 병렬 rollout 강조</title>
<link rel="stylesheet" href="_common_style.css">
<style>
.headline {
  text-align: center; font-size: 27px; font-weight: 700; color: var(--dark); line-height: 1.4;
}
.headline b { color: var(--purple); }
.headline .mono { font-family: 'JetBrains Mono', monospace; color: var(--purple); }

.hz-panel {
  padding: 20px 22px; border-radius: 12px;
  background: #fafafa; border: 2px solid #e8e8e8;
}
svg.hz { display: block; width: 100%; height: 480px; }

.meta-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
}
.meta-card {
  padding: 13px 16px; border-radius: 10px;
  background: #fafafa; border-left: 4px solid;
  font-size: 24px; font-weight: 600; color: var(--dark); line-height: 1.4;
}
.meta-card .hdr {
  font-size: 24px; font-weight: 800; display: block; margin-bottom: 3px;
}
.meta-card.a { border-color: var(--green); } .meta-card.a .hdr { color: var(--green); }
.meta-card.b { border-color: var(--purple); } .meta-card.b .hdr { color: var(--purple); }
.meta-card.c { border-color: var(--wine); } .meta-card.c .hdr { color: var(--wine); }
.meta-card .dim { color: var(--gray); font-weight: 500; }
.meta-card b { color: inherit; font-weight: 800; }
</style></head><body>

<h1 class="slide-title">Imagination Rollout — 2,500개 trajectory 병렬 전개</h1>
